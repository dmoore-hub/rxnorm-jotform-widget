<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dose / Strength</title>
<script src="https://js.jotform.com/JotFormCustomWidget.min.js"></script>
<style>
body { font-family: -apple-system, Helvetica, Arial, sans-serif; margin: 8px; font-size: 14px; }
#doseWrap { position: relative; max-width: 100%; }
#doseInput { width: 100%; box-sizing: border-box; padding: 8px 10px; font-size: 14px; border: 1px solid #ccc; border-radius: 4px; }
#doseSuggestions { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid #ccc; border-top: none; border-radius: 0 0 4px 4px; max-height: 220px; overflow-y: auto; z-index: 10; display: none; box-shadow: 0 4px 8px rgba(0,0,0,0.08); }
#doseSuggestions div { padding: 7px 10px; cursor: pointer; }
#doseSuggestions div:hover, #doseSuggestions div.active { background: #eef3ff; }
#hint { font-size: 12px; color: #888; margin-top: 4px; min-height: 14px; }
</style>
</head>
<body>
<div id="doseWrap">
<input type="text" id="doseInput" placeholder="e.g., 500 mg" autocomplete="off">
<div id="doseSuggestions"></div>
</div>
<div id="hint"></div>

<script>
(function () {
  var input = document.getElementById("doseInput");
  var wrap = document.getElementById("doseWrap");
  var list = document.getElementById("doseSuggestions");
  var hint = document.getElementById("hint");

  var allStrengths = [];
  var medName = "";
  var currentItems = [];
  var activeIndex = -1;

  function hideList() {
    list.style.display = "none";
    list.innerHTML = "";
    currentItems = [];
    activeIndex = -1;
    notifyResize();
  }

  function selectValue(value) {
    input.value = value;
    hideList();
    input.focus();
    notifyResize();
  }

  function renderList(items) {
    list.innerHTML = "";
    currentItems = items;
    activeIndex = -1;
    if (!items.length) { hideList(); return; }
    items.forEach(function (value, idx) {
      var item = document.createElement("div");
      item.textContent = value;
      item.setAttribute("data-idx", String(idx));
      item.addEventListener("mousedown", function (e) {
        e.preventDefault();
        selectValue(value);
      });
      list.appendChild(item);
    });
    list.style.display = "block";
    notifyResize();
  }

  function showMatches() {
    if (!allStrengths.length) { hideList(); return; }
    var term = input.value.trim().toLowerCase();
    var matches = term
      ? allStrengths.filter(function (s) { return s.toLowerCase().indexOf(term) !== -1; })
      : allStrengths.slice();
    renderList(matches);
  }

  function setOptions(strengths, name) {
    allStrengths = (strengths || []).map(function (s) { return (s || "").trim(); }).filter(Boolean);
    medName = name || "";
    hint.textContent = allStrengths.length
      ? "Common strengths for " + medName + " loaded — click the field to pick one, or type your own."
      : "";
    notifyResize();
  }

  window.addEventListener("message", function (e) {
    var d = e && e.data;
    if (!d || d.source !== "amarillomd-rxnorm-widget" || d.type !== "medication-selected") return;
    setOptions(d.strengths, d.name);
  });

  input.addEventListener("focus", showMatches);
  input.addEventListener("input", function () {
    showMatches();
    notifyResize();
  });

  input.addEventListener("keydown", function (e) {
    if (list.style.display !== "block") return;
    var items = list.querySelectorAll("div");
    if (e.key === "ArrowDown") { e.preventDefault(); activeIndex = Math.min(activeIndex + 1, items.length - 1); }
    else if (e.key === "ArrowUp") { e.preventDefault(); activeIndex = Math.max(activeIndex - 1, 0); }
    else if (e.key === "Enter") {
      if (activeIndex >= 0 && currentItems[activeIndex]) { e.preventDefault(); selectValue(currentItems[activeIndex]); }
      return;
    } else if (e.key === "Escape") { hideList(); return; }
    else { return; }
    items.forEach(function (el, idx) { el.classList.toggle("active", idx === activeIndex); });
    items[activeIndex].scrollIntoView({ block: "nearest" });
  });

  input.addEventListener("blur", function () { setTimeout(hideList, 150); });

  document.addEventListener("click", function (e) {
    if (!wrap.contains(e.target)) hideList();
  });

  function notifyResize() {
    if (window.JFCustomWidget && JFCustomWidget.requestFrameResize) {
      JFCustomWidget.requestFrameResize({ height: document.body.scrollHeight + 20 });
    }
  }

  if (window.JFCustomWidget) {
    JFCustomWidget.subscribe("ready", notifyResize);
    JFCustomWidget.subscribe("submit", function () {
      JFCustomWidget.sendSubmit({
        valid: true,
        value: input.value.trim()
      });
    });
  }
})();
</script>
</body>
</html>
